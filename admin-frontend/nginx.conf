server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for Flutter's web assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm font/woff2 image/svg+xml;
    gzip_min_length 1024;

    # Serve pre-compressed .gz files produced by `flutter build web --release`
    # when the browser supports it.
    location ~* \.(js|wasm|css|json)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Flutter assets — cache aggressively (filenames contain content hashes).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: every unknown path serves index.html so Flutter's router
    # handles it on the client side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
