# Retrieved from the official garage docs
# https://garagehq.deuxfleurs.fr/documentation/quick-start/
metadata_dir = "/tmp/meta"
data_dir = "/tmp/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

# Run the openssl command first and then replace the rpc secret with it
rpc_secret = "$(openssl rand -hex 32)"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"
index = "index.html"

[k2v_api]
api_bind_addr = "[::]:3904"

[admin]
api_bind_addr = "[::]:3903"

# Run the openssl command first and then replace the admin_token with it
admin_token = "$(openssl rand -base64 32)"

# Run the openssl command first and then replace the metrics_token with it
metrics_token = "$(openssl rand -base64 32)"